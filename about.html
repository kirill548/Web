                                        </div>
                                        <p class="photo-caption">Всероссийский слёт студентов ПОО, Ноябрьск</p>
                                    </div>
                                    <div class="photo-card">
                                        <div class="photo-container">
                                            <img src="images/event-ingeniada.jpg" alt="Инженериада" class="gallery-img" onerror="this.src='https://placehold.co/600x400/1e40af/white?text=Инженериада'">

                                        </div>
                                        <p class="photo-caption">Победа в Инженериаде</p>

                                    <i class="fas fa-cloud-upload-alt mr-1 text-blue-500"></i> Кликните на фото, чтобы заменить на своё изображение

                            </div>

                            <!-- Волонтёрство -->
                            <div class="volunteer-block">
                                <div class="volunteer-header">
                                    <i class="fas fa-heart text-3xl text-red-500"></i>
                                    <h3 class="volunteer-title">Волонтёрские проекты</h3>
                                </div>
                                <div class="volunteer-list">
                                    <div class="volunteer-item"><i class="fas fa-check-circle text-green-500"></i> Организация благотворительных акций в Учалинском районе</div>
                                    <div class="volunteer-item"><i class="fas fa-check-circle text-green-500"></i> Помощь в проведении молодёжных форумов и образовательных интенсивах</div>
                                    <div class="volunteer-item"><i class="fas fa-check-circle text-green-500"></i> Наставничество для студентов младших курсов</div>

            }
        };

        let currentPage = 'home';

        function renderPage(pageId) {
            const page = pages[pageId];
            if (!page) return;
            currentPage = pageId;
            document.title = `Кирилл Тимофеев | ${page.title}`;
            const appContent = document.getElementById('app-content');
            appContent.innerHTML = page.content;

            // Обновить активное состояние навигации
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(link => {
                if (link.getAttribute('data-page') === pageId) {
                    link.classList.add('active');
                } else {
                    link.classList.remove('active');
                }
            });

            attachFormHandler();
            attachPhotoUploadHandler();
        }

        function attachFormHandler() {
            const form = document.getElementById('callbackForm');
            if (form) {
                const newForm = form.cloneNode(true);
                form.parentNode.replaceChild(newForm, form);
                newForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('contactName')?.value.trim() || '';
                    if (!name) {
                        alert('Пожалуйста, введите имя');
                        return;
                    }
                    alert(`Спасибо, ${name}! Ваше сообщение отправлено. Я свяжусь с вами в ближайшее время.`);
                    newForm.reset();
                });
            }
        }

        function attachPhotoUploadHandler() {
            const photoCards = document.querySelectorAll('.photo-card');
            photoCards.forEach(card => {
                const imgElement = card.querySelector('img');
                if (imgElement && !card.hasPhotoListener) {
                    card.style.cursor = 'pointer';
                    card.addEventListener('click', () => {
                        const fileInput = document.createElement('input');
                        fileInput.type = 'file';
                        fileInput.accept = 'image/*';
                        fileInput.onchange = (event) => {
                            const file = event.target.files[0];
                            if (file) {
                                const reader = new FileReader();
                                reader.onload = (loadEvent) => {
                                    imgElement.src = loadEvent.target.result;
                                    showToast('✅ Фото обновлено!');
                                };
                                reader.readAsDataURL(file);
                            }
                        };
                        fileInput.click();
                    });
                    card.hasPhotoListener = true;
                }
            });
        }

        function showToast(message) {
            const toast = document.createElement('div');
            toast.innerText = message;
            toast.className = 'toast-notification';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2000);
        }

        window.navigateTo = function (sectionId) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        };

        function initNavigation() {
            document.querySelectorAll('.nav-item, .mobile-nav-item').forEach(link => {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    const pageId = link.getAttribute('data-page');
                    if (pageId) renderPage(pageId);
                    const mobileMenu = document.getElementById('mobileMenu');
                    if (mobileMenu) mobileMenu.classList.add('hidden');
                });
            });

            const menuBtn = document.getElementById('mobileMenuBtn');
            const mobileMenu = document.getElementById('mobileMenu');
            if (menuBtn && mobileMenu) {
                menuBtn.addEventListener('click', () => mobileMenu.classList.toggle('hidden'));
            }
        }

        renderPage('home');
        initNavigation();
    </script>
</body>
